version: 2

project_name: hf

before:
  hooks:
    - go mod tidy

builds:
  - id: hf
    main: .
    binary: hf
    ldflags:
      - -s -w
      - -X github.com/rh-amarin/hyperfleet-cli/internal/version.Version={{.Version}}
      - -X github.com/rh-amarin/hyperfleet-cli/internal/version.Commit={{.Commit}}
      - -X github.com/rh-amarin/hyperfleet-cli/internal/version.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: hf
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: rh-amarin
    name: hyperfleet-cli
  draft: false
  prerelease: auto

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
